name: dropit
description: Universal media downloader via Share Intent
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  receive_sharing_intent: ^1.8.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  http: ^1.2.1
  flutter_local_notifications: ^17.2.2
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: "assets/icon_foreground.png"
  min_sdk_android: 26

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/placeholder.png
